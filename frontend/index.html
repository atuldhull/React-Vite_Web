<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover is required for safe-area-inset env() vars to have
         non-zero values on notched devices (iPhone X and later). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Math Collective - A competitive mathematics platform for university students. Solve challenges, compete in events, and climb the leaderboard."
    />
    <title>Math Collective | Where Math Becomes Epic</title>

    <!-- Open Graph + Twitter Card — drives the preview card that shows
         up when someone pastes a link in WhatsApp / Discord / Slack /
         Twitter. Without these, sharing the URL shows just a raw link
         with no image or context. -->
    <meta property="og:type"          content="website" />
    <meta property="og:site_name"     content="Math Collective" />
    <meta property="og:title"         content="Math Collective — Where Math Becomes Epic" />
    <meta property="og:description"   content="Competitive math for university students. Challenge arena, live quizzes, E2EE chat, XP leaderboards, QR-verifiable certificates." />
    <meta property="og:url"           content="https://math-collective.onrender.com" />
    <meta property="og:image"         content="https://math-collective.onrender.com/app/icons/icon-512.png" />
    <meta property="og:image:width"   content="512" />
    <meta property="og:image:height"  content="512" />

    <meta name="twitter:card"         content="summary_large_image" />
    <meta name="twitter:title"        content="Math Collective — Where Math Becomes Epic" />
    <meta name="twitter:description"  content="Competitive math for university students. Challenge arena, live quizzes, E2EE chat, QR-verifiable certificates." />
    <meta name="twitter:image"        content="https://math-collective.onrender.com/app/icons/icon-512.png" />
    <!-- ════════════════════════════════════════════════════════════
         LCP / above-the-fold strategy (Phase-12 hardening)
         ────────────────────────────────────────────────────────────
         • preconnect to fontshare CDN (api + cdn) so the TLS+TCP
           handshake happens in parallel with HTML parsing — saves
           ~200 ms on cold load over a fresh DNS.
         • dns-prefetch to api.razorpay.com — only hit on the payment
           page, but the resolver lookup is essentially free to
           speculatively warm and a few ms saved at checkout matters.
         • Fontshare CSS request: NON-BLOCKING via the preload-swap
           pattern below. Without this, the <link rel="stylesheet">
           was a render-blocking dependency on a third-party CDN that
           could stall LCP by hundreds of ms on a flaky network. The
           preload-then-set-rel pattern lets the browser fetch the
           font CSS in parallel with everything else and apply it
           once it arrives — FOUT is intentional, matches the
           display=swap directive in the URL.
         • The <noscript> fallback keeps fonts working for crawlers
           and assistive tech that doesn't run JS.
         ════════════════════════════════════════════════════════════ -->
    <link rel="preconnect"   href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect"   href="https://cdn.fontshare.com" crossorigin />
    <link rel="dns-prefetch" href="https://api.razorpay.com" />
    <link rel="dns-prefetch" href="https://checkout.razorpay.com" />

    <!-- font-display=swap directive is preserved in the URL — the
         browser will paint with the fallback stack first and swap in
         Satoshi / Clash Display once they arrive. -->
    <link
      rel="preload"
      as="style"
      href="https://api.fontshare.com/v2/css?f%5B%5D=satoshi@300,400,500,600,700,800,900&f%5B%5D=clash-display@500,600,700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://api.fontshare.com/v2/css?f%5B%5D=satoshi@300,400,500,600,700,800,900&f%5B%5D=clash-display@500,600,700&display=swap"
      />
    </noscript>

    <link rel="manifest" href="/app/manifest.json" />
    <meta name="theme-color" content="#7c3aed" />
    <!-- Older iOS Safari still looks at this meta. The spec name is
         "mobile-web-app-capable" — we set both for compat. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MathCol" />
    <link rel="apple-touch-icon" href="/app/icons/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.jsx"></script>
  </body>
  </html>
