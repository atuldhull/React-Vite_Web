<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover is required for safe-area-inset env() vars to have
         non-zero values on notched devices (iPhone X and later). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Math Collective - A competitive mathematics platform for university students. Solve challenges, compete in events, and climb the leaderboard."
    />
    <title>Math Collective | Where Math Becomes Epic</title>
    <link rel="manifest" href="/app/manifest.json" />
    <meta name="theme-color" content="#7c3aed" />
    <!-- Older iOS Safari still looks at this meta. The spec name is
         "mobile-web-app-capable" — we set both for compat. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MathCol" />
    <link rel="apple-touch-icon" href="/app/icons/icon-192.png" />
    <script type="module" crossorigin src="/app/assets/app.js"></script>
    <link rel="modulepreload" crossorigin href="/app/assets/chunk.js">
    <link rel="modulepreload" crossorigin href="/app/assets/http.js">
    <link rel="modulepreload" crossorigin href="/app/assets/api2.js">
    <link rel="modulepreload" crossorigin href="/app/assets/cn.js">
    <link rel="modulepreload" crossorigin href="/app/assets/react.js">
    <link rel="modulepreload" crossorigin href="/app/assets/auth-store.js">
    <link rel="modulepreload" crossorigin href="/app/assets/proxy.js">
    <link rel="modulepreload" crossorigin href="/app/assets/use-transform.js">
    <link rel="stylesheet" crossorigin href="/app/assets/app.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
  </html>
