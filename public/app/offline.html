<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Math Collective — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #030712;
      color: #e0e7ff;
      font-family: 'Space Grotesk', -apple-system, sans-serif;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    .symbol {
      font-size: 4rem;
      color: #7c3aed;
      opacity: 0.6;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }
    h1 {
      margin-top: 1.5rem;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    p {
      margin-top: 0.75rem;
      color: rgba(224, 231, 255, 0.5);
      font-size: 0.9rem;
      line-height: 1.6;
    }
    button {
      margin-top: 1.5rem;
      padding: 0.6rem 1.5rem;
      background: #7c3aed;
      color: white;
      border: none;
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.05em;
    }
    button:hover { background: #6d28d9; }
    .hint {
      margin-top: 2rem;
      font-size: 0.7rem;
      color: rgba(224, 231, 255, 0.25);
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="symbol">∞</div>
    <h1>You're Offline</h1>
    <p>Can't connect to Math Collective right now. Check your internet connection and try again.</p>
    <button onclick="window.location.reload()">Try Again</button>
    <p class="hint">Cached content may still be available</p>
  </div>
</body>
</html>
